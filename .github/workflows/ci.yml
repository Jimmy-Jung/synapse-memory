name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: python3 -m pip install -e ".[dev]"

      - name: Ruff
        run: python3 -m ruff check src/synapse_memory/cost src/synapse_memory/daily.py src/synapse_memory/cli.py tests/test_cost_events.py tests/test_cost_summary.py tests/test_cost_cli.py tests/test_llm_claude.py tests/test_apfel.py tests/test_daily.py tests/test_daily_cli.py

      - name: Mypy
        run: python3 -m mypy --strict src/synapse_memory/cost src/synapse_memory/daily.py

      - name: Pytest
        run: python3 -m pytest tests/ -W ignore::DeprecationWarning
