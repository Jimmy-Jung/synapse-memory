name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: python3 -m pip install -e ".[dev]"

      - name: Ruff
        run: python3 -m ruff check src/synapse_memory tests

      - name: Mypy
        run: python3 -m mypy --strict src/synapse_memory

      - name: Pytest
        run: python3 -m pytest tests/ -W ignore::DeprecationWarning
